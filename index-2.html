<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Balagan"/>
<meta name="theme-color" content="#090605"/>
<title>Balagan · Presenze</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#090605;color:#EEE6DC;font-family:'Century Gothic','Futura','Trebuchet MS',sans-serif;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}button:active{opacity:.7;}
input,select,textarea{font-family:inherit;}input::placeholder{color:#3A2015;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:#120A07;}::-webkit-scrollbar-thumb{background:#32190E;}
/* SPLASH */
#splash{position:fixed;inset:0;background:#090605;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .3s;}
#splash.done{opacity:0;pointer-events:none;}
#splash img{width:56px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.6;transform:scale(1.04);}}
.sn{font-size:17px;font-weight:300;letter-spacing:8px;color:#6A5040;}.ss{font-size:7px;letter-spacing:5px;color:#3A2015;}
#app{visibility:hidden;}
/* HEADER */
.hdr{background:#120A07;border-bottom:1px solid #32190E;position:sticky;top:0;z-index:50;padding-top:env(safe-area-inset-top);}
.ht{display:flex;align-items:center;height:52px;padding:0 14px;}
.logo{display:flex;align-items:center;gap:8px;margin-right:12px;flex-shrink:0;}
.logo img{width:19px;height:23px;}
.ln{font-size:16px;font-weight:300;color:#EEE6DC;letter-spacing:6px;}.ls{font-size:6px;font-weight:200;color:#6A5040;letter-spacing:5px;margin-top:2px;}
nav{display:flex;height:52px;overflow-x:auto;flex:1;}nav::-webkit-scrollbar{display:none;}
nav button{background:transparent;border:none;border-bottom:1px solid transparent;padding:0 12px;height:52px;font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:300;color:#6A5040;white-space:nowrap;}
nav button.on{color:#EEE6DC;border-bottom-color:#EEE6DC;}
.xb{background:transparent;border:1px solid #32190E;color:#6A5040;padding:5px 10px;font-size:7px;letter-spacing:2px;text-transform:uppercase;font-weight:200;flex-shrink:0;}
/* SUBBAR */
.sub{border-top:1px solid #200F08;padding:8px 14px;}
.mr{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.mb{background:transparent;border:1px solid #32190E;color:#6A5040;width:26px;height:26px;font-size:14px;line-height:24px;text-align:center;}
#mlbl{font-weight:200;font-size:12px;letter-spacing:5px;text-transform:uppercase;flex:1;text-align:center;color:#EEE6DC;}
.sb{display:flex;align-items:center;border:1px solid #32190E;}
.sb input{background:transparent;border:none;color:#C4B09A;outline:none;padding:6px 6px 6px 0;font-size:8px;letter-spacing:2px;text-transform:uppercase;width:100%;}
.si{padding:0 8px;color:#6A5040;font-size:10px;}.sc{background:transparent;border:none;color:#6A5040;padding:0 8px;font-size:14px;}
.fbar{display:flex;gap:6px;flex-wrap:wrap;padding:6px 0 2px;}
.fbtn{background:transparent;border:1px solid #32190E;color:#6A5040;padding:3px 10px;font-family:inherit;font-size:7px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.fbtn.on{color:#EEE6DC;border-color:#EEE6DC;}
.fbtn.c{border-color:rgba(192,112,96,.4);color:#C07060;}.fbtn.c.on{background:rgba(192,112,96,.15);}
.fbtn.s{border-color:rgba(96,144,176,.4);color:#6090B0;}.fbtn.s.on{background:rgba(96,144,176,.15);}
.fbtn.b{border-color:rgba(136,168,96,.4);color:#88A860;}.fbtn.b.on{background:rgba(136,168,96,.15);}
.fbtn.a{border-color:rgba(144,128,176,.4);color:#9080B0;}.fbtn.a.on{background:rgba(144,128,176,.15);}
/* VIEWS */
#vCal{display:block;}
#vStats,#vAnn,#vTurni,#vFC,#vTeam{display:none;padding:14px;}
/* CALENDAR */
.cw{padding:10px 0 10px 10px;}
.leg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;padding-right:10px;}
.li{display:flex;align-items:center;gap:3px;}
.ld{width:20px;height:17px;border-radius:1px;display:flex;align-items:center;justify-content:center;font-size:7px;}
.ll{color:#6A5040;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;}
.ct{border-collapse:collapse;font-size:10px;}
.thn{padding:5px 10px;background:#120A07;color:#6A5040;text-align:left;font-weight:200;font-size:7px;letter-spacing:2px;text-transform:uppercase;position:sticky;left:0;z-index:2;min-width:145px;border-right:1px solid #200F08;border-bottom:1px solid #32190E;}
.thd{padding:2px 0;min-width:26px;text-align:center;border-left:1px solid #200F08;border-bottom:1px solid #32190E;}
.tht{padding:3px 5px;background:#090605;font-size:7px;font-weight:200;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;border-left:1px solid #32190E;border-bottom:1px solid #32190E;}
.tdn{padding:2px 10px;font-weight:300;font-size:9px;color:#C4B09A;white-space:nowrap;letter-spacing:1px;position:sticky;left:0;border-right:1px solid #200F08;max-width:145px;overflow:hidden;text-overflow:ellipsis;}
.tdc{padding:1.5px;text-align:center;cursor:pointer;border-left:1px solid #200F08;}
.tdc:hover{background:rgba(201,138,74,.05);}
.ci{border-radius:1px;width:22px;height:18px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:300;}
.tds{padding:2px 6px;font-size:8px;font-weight:200;border-left:1px solid #32190E;}
/* STATS / ANNUAL */
.scard{background:#120A07;border:1px solid #32190E;padding:16px;margin-bottom:12px;}
.slbl{font-weight:200;font-size:7px;color:#6A5040;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
.ct2{width:100%;border-collapse:collapse;}
.ct2 th{padding:6px 8px;background:#090605;color:#6A5040;text-align:left;font-weight:200;font-size:7px;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #32190E;}
.ct2 td{padding:7px 8px;font-size:9px;border-bottom:1px solid #200F08;}
.bc{display:flex;align-items:flex-end;gap:2px;height:110px;padding-bottom:18px;}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;}
.bar{width:100%;max-width:22px;background:#A86B35;border-radius:1px 1px 0 0;min-height:1px;}
.bl{font-size:6px;color:#6A5040;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;margin-top:2px;}
.bv{font-size:7px;color:#C98A4A;font-weight:300;}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.kc{background:#120A07;border:1px solid #32190E;padding:14px;}
.kl{font-weight:200;font-size:7px;color:#6A5040;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.kv{font-weight:100;font-size:24px;letter-spacing:1px;}
.at{width:100%;border-collapse:collapse;font-size:9px;}
.at th{padding:5px 3px;background:#090605;color:#6A5040;text-align:center;font-weight:200;font-size:7px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #32190E;}
.at th:first-child{text-align:left;padding:5px 8px;min-width:130px;}.at th:last-child{color:#C98A4A;border-left:1px solid #32190E;}
.at td{padding:5px 3px;text-align:center;border-bottom:1px solid #200F08;border-left:1px solid #200F08;}
.at td:first-child{text-align:left;padding:5px 8px;color:#C4B09A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}.at td:last-child{border-left:1px solid #32190E;}
.at .ft{border-top:1px solid #32190E;background:#090605;}.at .ft td{color:#A86B35;}.at .ft td:first-child{color:#6A5040;font-size:7px;letter-spacing:2px;text-transform:uppercase;}.at .ft td:last-child{color:#C98A4A;font-size:13px;}
/* TURNI */
.tw{overflow-x:auto;padding-bottom:10px;}
.tct{border-collapse:collapse;font-size:10px;min-width:100%;}
.tct th{padding:6px 8px;background:#120A07;color:#6A5040;font-weight:200;font-size:7px;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #32190E;white-space:nowrap;}
.tct th.dh{text-align:center;min-width:90px;border-left:1px solid #200F08;}
.tct th.dh.we{background:#0E0705;color:#3A2015;}
.tct th:first-child{text-align:left;position:sticky;left:0;z-index:2;min-width:145px;border-right:1px solid #200F08;}
.tct td:first-child{position:sticky;left:0;background:#1A0F0A;z-index:1;font-size:9px;color:#C4B09A;padding:4px 10px;border-right:1px solid #200F08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:145px;}
.tct tr:nth-child(even) td:first-child{background:#120A07;}
.tcell{padding:3px;border-left:1px solid #200F08;border-bottom:1px solid #200F08;text-align:center;cursor:pointer;vertical-align:middle;}
.tcell:hover{background:rgba(201,138,74,.06);}
.tpill{border-radius:2px;padding:4px 6px;font-size:8px;font-weight:300;letter-spacing:1px;display:inline-block;min-width:76px;text-align:center;}
/* FOOD COST */
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:14px;}
.fc-card{background:#120A07;border:1px solid #32190E;padding:14px;cursor:pointer;transition:border-color .15s;}
.fc-card:hover{border-color:#6A5040;}
.fc-card-name{font-size:12px;font-weight:300;letter-spacing:2px;color:#EEE6DC;margin-bottom:4px;text-transform:uppercase;}
.fc-card-cat{font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.fc-meters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.fc-meter{background:#090605;padding:8px 6px;text-align:center;}
.fc-meter-lbl{font-size:6px;letter-spacing:2px;text-transform:uppercase;color:#6A5040;margin-bottom:3px;}
.fc-meter-val{font-size:13px;font-weight:300;}
.fc-pct-bar{height:3px;background:#200F08;margin-top:10px;border-radius:2px;}
.fc-pct-fill{height:100%;border-radius:2px;transition:width .4s;}
.fc-ing-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #200F08;}
.fc-ing-name{flex:1;font-size:9px;color:#C4B09A;}
.fc-ing-detail{font-size:8px;color:#6A5040;white-space:nowrap;}
.fc-ing-cost{font-size:10px;color:#C98A4A;white-space:nowrap;min-width:48px;text-align:right;}
.fc-inp{background:#090605;border:1px solid #32190E;color:#EEE6DC;padding:6px 8px;font-family:inherit;font-size:9px;outline:none;width:100%;}
.fc-inp:focus{border-color:#6A5040;}
.fc-inp-sm{background:#090605;border:1px solid #32190E;color:#EEE6DC;padding:5px 6px;font-family:inherit;font-size:9px;outline:none;}
.fc-inp-sm:focus{border-color:#6A5040;}
.fc-label{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:#6A5040;margin-bottom:5px;margin-top:10px;display:block;}
.fc-add-btn{background:transparent;border:1px dashed #32190E;color:#6A5040;padding:8px;width:100%;font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-top:8px;}
.fc-add-btn:hover{border-color:#6A5040;color:#C4B09A;}
.fc-del{background:transparent;border:none;color:#32190E;font-size:14px;padding:0 4px;flex-shrink:0;}
.fc-del:hover{color:#9A3520;}
select.fc-inp-sm{cursor:pointer;}
/* TEAM */
.tl{background:#120A07;border:1px solid #32190E;}
.ti{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #200F08;flex-wrap:wrap;}
.tav{width:28px;height:28px;background:#090605;border:1px solid #32190E;display:flex;align-items:center;justify-content:center;font-weight:100;font-size:12px;flex-shrink:0;}
.tnm{font-weight:300;font-size:9px;color:#C4B09A;letter-spacing:1.5px;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tsb{font-size:8px;color:#6A5040;margin-top:1px;}
.trm{background:transparent;border:1px solid #32190E;color:#6A5040;padding:3px 8px;font-size:7px;letter-spacing:2px;text-transform:uppercase;font-weight:200;flex-shrink:0;}
.tadd{display:flex;gap:8px;padding:12px 14px;background:#090605;border-top:1px solid #32190E;}
.tadd input{flex:1;background:transparent;border:1px solid #32190E;color:#EEE6DC;padding:8px 10px;font-size:8px;letter-spacing:2px;outline:none;text-transform:uppercase;}
.tabtn{background:#EEE6DC;color:#090605;border:none;padding:8px 14px;font-size:8px;font-weight:400;letter-spacing:3px;text-transform:uppercase;flex-shrink:0;}
.sec-hdr{font-size:7px;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #200F08;}
.sbtn{border:1px solid;padding:3px 8px;font-family:inherit;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;background:transparent;}
.sec-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0;}
/* MODALS */
.ov{position:fixed;inset:0;background:rgba(6,3,1,.95);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.mo{background:#120A07;border:1px solid #32190E;border-radius:12px 12px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.me{font-weight:200;font-size:7px;color:#6A5040;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.md{font-weight:100;font-size:15px;color:#EEE6DC;margin-bottom:14px;letter-spacing:2px;}
.ms{font-weight:200;font-size:7px;color:#6A5040;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.hbs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.hb{width:38px;height:38px;background:#1A0F0A;border:1px solid #32190E;color:#C4B09A;font-size:17px;font-weight:200;}
.hba{background:#EEE6DC;border-color:#EEE6DC;color:#090605;font-weight:400;}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:12px;}
.tb{background:#1A0F0A;border:1px solid #32190E;color:#6A5040;padding:9px 10px;font-size:8px;text-align:left;letter-spacing:1.5px;text-transform:uppercase;font-weight:200;}
.mf{display:flex;gap:8px;}
.mc{flex:1;background:transparent;border:1px solid rgba(154,53,32,.4);color:#9A3520;padding:9px;font-size:7px;letter-spacing:3px;text-transform:uppercase;font-weight:200;}
.mx{flex:1;background:#1A0F0A;border:1px solid #32190E;color:#6A5040;padding:9px;font-size:7px;letter-spacing:3px;text-transform:uppercase;font-weight:200;}
.hl{height:1px;background:#200F08;margin-bottom:12px;}
.cfov{position:fixed;inset:0;background:rgba(6,3,1,.96);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.cfb{background:#120A07;border:1px solid rgba(154,53,32,.5);padding:22px;max-width:300px;width:100%;}
.toast{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#120A07;border:1px solid #32190E;color:#C4B09A;padding:9px 16px;font-size:8px;letter-spacing:3px;z-index:200;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.8);}
</style>
</head>
<body>

<div id="splash">
  <img id="simg" alt=""/>
  <div class="sn">BALAGAN</div>
  <div class="ss">CARICAMENTO</div>
</div>

<div id="app">
  <div class="hdr">
    <div class="ht">
      <div class="logo"><img id="lg" alt=""/><div><div class="ln">BALAGAN</div><div class="ls">PRESENZE</div></div></div>
      <nav>
        <button class="on" onclick="sv('Cal')">Cal.</button>
        <button onclick="sv('Stats')">Stat.</button>
        <button onclick="sv('Ann')">Anno</button>
        <button onclick="sv('Turni')">Turni</button>
        <button onclick="sv('FC')">Food Cost</button>
        <button onclick="sv('Team')">Team</button>
      </nav>
      <button class="xb" onclick="expM()">&#8595; XLS</button>
    </div>
    <div class="sub" id="sub">
      <div class="mr">
        <button class="mb" onclick="pm()">&#8249;</button>
        <div id="mlbl"></div>
        <button class="mb" onclick="nm()">&#8250;</button>
      </div>
      <div class="sb">
        <span class="si">&#x2315;</span>
        <input type="search" id="srch" placeholder="Cerca dipendente..." oninput="rCal()"/>
        <button class="sc" onclick="document.getElementById('srch').value='';rCal()">&#215;</button>
      </div>
      <div class="fbar">
        <button class="fbtn on" onclick="setSF('t')">Tutti</button>
        <button class="fbtn c"  onclick="setSF('c')">Cucina</button>
        <button class="fbtn s"  onclick="setSF('s')">Sala</button>
        <button class="fbtn b"  onclick="setSF('b')">Bar</button>
        <button class="fbtn a"  onclick="setSF('a')">Altro</button>
      </div>
    </div>
  </div>

  <div id="vCal"><div class="cw"><div class="leg" id="leg"></div>
    <div style="overflow-x:auto;padding-right:10px;"><table class="ct" id="ct"></table></div>
  </div></div>
  <div id="vStats"></div>
  <div id="vAnn"></div>
  <div id="vTurni"></div>
  <div id="vFC"></div>
  <div id="vTeam"></div>
</div>

<!-- PRESENZE MODAL -->
<div class="ov" id="cmod" style="display:none" onclick="cMo()">
  <div class="mo" onclick="event.stopPropagation()">
    <div class="me" id="memp"></div><div class="hl"></div>
    <div class="md" id="mdat"></div>
    <div class="ms">Ore lavorate</div><div class="hbs" id="hbs"></div>
    <div class="ms">Tipo giornata</div><div class="tg" id="tgr"></div>
    <div class="hl"></div>
    <div class="mf">
      <button class="mc" onclick="clC()">&#10005; Cancella</button>
      <button class="mx" onclick="cMo()">Chiudi</button>
    </div>
  </div>
</div>

<!-- TURNI MODAL -->
<div class="ov" id="tmod" style="display:none" onclick="cTMo()">
  <div class="mo" onclick="event.stopPropagation()">
    <div class="me" id="tmemp"></div><div class="hl"></div>
    <div class="md" id="tmdat"></div>
    <div class="ms">Turno assegnato</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;" id="tshift-btns"></div>
    <div class="ms">Orario personalizzato</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <input type="text" id="tcustom" placeholder="es. 10:00-16:00"
        style="flex:1;background:#1A0F0A;border:1px solid #32190E;color:#EEE6DC;padding:8px 10px;font-size:11px;outline:none;letter-spacing:1px;"
        onkeydown="if(event.key==='Enter')setTurno(this.value)"/>
      <button onclick="setTurno(document.getElementById('tcustom').value)"
        style="background:#C98A4A;color:#0C0A08;border:none;padding:8px 14px;font-size:8px;letter-spacing:2px;text-transform:uppercase;">OK</button>
    </div>
    <div class="hl"></div>
    <div class="mf">
      <button class="mc" onclick="clTurno()">&#10005; Cancella turno</button>
      <button class="mx" onclick="cTMo()">Chiudi</button>
    </div>
  </div>
</div>

<!-- FOOD COST MODAL -->
<div class="ov" id="fcmod" style="display:none" onclick="cFCMo(event)">
  <div class="mo" onclick="event.stopPropagation()">
    <div class="me">FOOD COST</div><div class="hl"></div>
    <div id="fcmod-body"></div>
  </div>
</div>

<!-- CONFIRM REMOVE -->
<div class="cfov" id="cfmod" style="display:none" onclick="cCf()">
  <div class="cfb" onclick="event.stopPropagation()">
    <div style="color:#9A3520;font-weight:200;font-size:7px;margin-bottom:10px;letter-spacing:3px;text-transform:uppercase;">Conferma Rimozione</div>
    <div id="cfnm" style="color:#EEE6DC;font-size:12px;margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:200;"></div>
    <div style="color:#6A5040;font-size:11px;margin-bottom:20px;line-height:1.6;">I dati verranno eliminati definitivamente.</div>
    <div style="display:flex;gap:8px;">
      <button onclick="doRm()" style="flex:1;background:#9A3520;border:none;color:#F0E8E6;padding:10px;font-family:inherit;font-size:7px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;">Rimuovi</button>
      <button onclick="cCf()" style="flex:1;background:#1A0F0A;border:1px solid #32190E;color:#6A5040;padding:10px;font-family:inherit;font-size:7px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;">Annulla</button>
    </div>
  </div>
</div>

// ── HELPERS ────────────────────────────────────────────────────────────────────
function dim(y,m){ return new Date(y,m+1,0).getDate(); }
function dname(y,m,d){ return DAYS[new Date(y,m,d).getDay()]; }
function isWE(y,m,d){ var w=new Date(y,m,d).getDay(); return w===0||w===6; }
function dkey(e,d){ return yr+'-'+mo+'-'+e+'-'+d; }
function gv(e,d){ return data[dkey(e,d)]||''; }
function cstyle(v){
  if(!v) return {bg:'transparent',fg:'#3A2015'};
  if(!isNaN(parseFloat(v))) return {bg:'#647A4E',fg:'#ECF0E8'};
  var c=CODES.find(function(x){return x.c===v;});
  return c?{bg:c.bg,fg:c.fg}:{bg:'#1A0F0A',fg:'#6A5040'};
}
function calcS(e,y,m){
  var days=dim(y,m),ore=0,r=0,f=0,b=0,mal=0,p=0,c=0;
  for(var d=1;d<=days;d++){
    var v=data[y+'-'+m+'-'+e+'-'+d]||'';
    if(!v||v==='RR') continue;
    var n=parseFloat(v);
    if(!isNaN(n)) ore+=(n===1?8:n);
    else if(v==='R') r++;
    else if(v==='F') f+=8;
    else if(v==='B') b++;
    else if(v==='M') mal+=8;
    else if(v==='P') p+=8;
    else if(v==='C') c++;
  }
  return {ore:ore,r:r,f:f,b:b,mal:mal,p:p,c:c};
}
function calcA(e,y){
  var t={ore:0,f:0,b:0,mal:0};
  for(var m=0;m<12;m++){var s=calcS(e,y,m);t.ore+=s.ore;t.f+=s.f;t.b+=s.b;t.mal+=s.mal;}
  return t;
}
function escQ(e){ return e.replace(/\\/g,'\\\\').replace(/'/g,'\\\''); }
function filteredEmp(){
  var q=(document.getElementById('srch')?document.getElementById('srch').value||'':'').toLowerCase();
  return emp.filter(function(e){
    return (!q||e.toLowerCase().indexOf(q)>=0)&&(filterSec==='t'||(sections[e]||'a')===filterSec);
  });
}

function getMonday(d){var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);return new Date(d.getFullYear(),d.getMonth(),diff);}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function tkv(e,ds){return turni[ds+'-'+e]||'';}
function tshiftStyle(v){
  if(!v) return {bg:'transparent',fg:'#3A2015'};
  var s=TSHIFT.find(function(x){return x.c===v.toUpperCase();});
  return s?{bg:s.bg,fg:s.fg}:{bg:'#2A1A0A',fg:'#C98A4A'};
}
function rTurni(){
  if(!tWeekStart) tWeekStart=getMonday(new Date());
  var days=[];
  for(var i=0;i<7;i++) days.push(addDays(tWeekStart,i));
  var wlbl=DAYS[days[0].getDay()]+' '+days[0].getDate()+' — '+DAYS[days[6].getDay()]+' '+days[6].getDate()+' '+days[0].toLocaleString('it-IT',{month:'long',year:'numeric'});
  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">'
    +'<button class="mb" onclick="tWeekStart=addDays(tWeekStart,-7);rTurni()">&#8249;</button>'
    +'<div style="font-weight:200;font-size:11px;letter-spacing:3px;text-transform:uppercase;flex:1;text-align:center;color:#EEE6DC;">'+wlbl+'</div>'
    +'<button class="mb" onclick="tWeekStart=addDays(tWeekStart,7);rTurni()">&#8250;</button>'
    +'<button class="mb" onclick="tWeekStart=getMonday(new Date());rTurni()" style="font-size:8px;width:auto;padding:0 8px;">OGGI</button>'
    +'</div>';
  h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">';
  TSHIFT.forEach(function(s){h+='<div style="background:'+s.bg+';color:'+s.fg+';padding:2px 7px;font-size:7px;letter-spacing:1.5px;border-radius:2px;">'+s.c+'</div>';});
  h+='</div><div class="tw"><table class="tct"><thead><tr><th style="position:sticky;left:0;z-index:3;background:#120A07;">Dipendente</th>';
  var today=fmtDate(new Date());
  days.forEach(function(d){
    var ds=fmtDate(d);var dn=d.getDay();var we=dn===0||dn===6;var isT=ds===today;
    h+='<th class="dh'+(we?' we':'')+'" style="'+(isT?'border-bottom:1px solid #C98A4A;':'')+'">'
      +'<div style="color:'+(isT?'#C98A4A':(we?'#3A2015':'#6A5040'))+'">'+DAYS[dn]+'</div>'
      +'<div style="font-size:10px;color:'+(isT?'#EEE6DC':'#C4B09A')+'">'+d.getDate()+'</div></th>';
  });
  h+='</tr></thead><tbody>';
  emp.forEach(function(e,ei){
    var rb=ei%2===0?'#1A0F0A':'#120A07';
    var eq=escQ(e);
    h+='<tr><td style="background:'+rb+'">'+e+'</td>';
    days.forEach(function(d){
      var ds=fmtDate(d);var v=tkv(e,ds);var st=tshiftStyle(v);var dn=d.getDay();var we=dn===0||dn===6;
      var dm=d.getDate()+'/'+(d.getMonth()+1);
      h+='<td class="tcell" style="background:'+(we?'rgba(0,0,0,.15)':rb)+'" onclick="oTMod(\''+eq+'\',\''+ds+'\',\''+dm+'\')">'
        +(v?'<div class="tpill" style="background:'+st.bg+';color:'+st.fg+'">'+v+'</div>'
          :'<div style="color:#3A2015;font-size:14px;">&#183;</div>')+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('vTurni').innerHTML=h;
}
function oTMod(e,ds,dm){
  tEmp=e; tDate=ds;
  document.getElementById('tmemp').textContent=e;
  document.getElementById('tmdat').textContent=dm;
  var cur=tkv(e,ds);
  var btns='';

    var active=cur.toUpperCase()===s.c;
    btns+='<button onclick="setTurno(\''+s.c+'\')" style="background:'+(active?s.bg:'#1A0F0A')+';color:'+(active?s.fg:'#6A5040')+';border:1px solid '+(active?s.bg:'#32190E')+';padding:9px 4px;font-family:inherit;font-size:8px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;">'+s.c+'</button>';
  });

function setTurno(v){if(!tEmp||!tDate)return;v=(v||'').trim().toUpperCase();if(!v)return;turni[tDate+'-'+tEmp]=v;save();cTMo();rTurni();showToast(v+' assegnato');}

// ── FOOD COST ──────────────────────────────────────────────────────────────────
function fcIngCost(ing){
  var qty=parseFloat(ing.qty)||0;
  var up=parseFloat(ing.unitPrice)||0;
  if(ing.unit==='g')  return qty/1000*up;
  if(ing.unit==='ml') return qty/1000*up;
  if(ing.unit==='cl') return qty/100*up;
  if(ing.unit==='kg') return qty*up;
  if(ing.unit==='l')  return qty*up;
  return qty*up; // pz
}
function fcDishCost(dish){
  return (dish.ingredients||[]).reduce(function(a,ing){return a+fcIngCost(ing);},0);
}
function fcColor(pct){
  if(pct<=25) return '#7A9A5A';
  if(pct<=33) return '#C98A4A';
  return '#9A3520';
}

          +'<div class="fc-meter"><div class="fc-meter-lbl">Prezzo</div><div class="fc-meter-val" style="color:#EEE6DC;">&#8364;'+(parseFloat(d.menuPrice)||0).toFixed(2)+'</div></div>'
          +'<div class="fc-meter"><div class="fc-meter-lbl">FC%</div><div class="fc-meter-val" style="color:'+col+';">'+fcPct+'%</div></div>'

          +'<span style="color:'+(margin>=0?'#7A9A5A':'#9A3520')+';">&#8364;'+margin.toFixed(2)+'</span>'
          +'</div>'
          +'</div>';
      });
      h+='</div>';
    });
    // Summary
    var allCosts=ids.map(function(id){return fcDishCost(dishes[id]);});
    var avgFC=ids.length?Math.round(ids.reduce(function(a,id){var d=dishes[id];var cost=fcDishCost(d);var net=(parseFloat(d.menuPrice)||0)/(1+FC_IVA);return a+(net>0?cost/net*100:0);},0)/ids.length):0;
    h+='<div class="scard" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;">'
      +'<div><div class="kl">Piatti</div><div class="kv" style="font-size:18px;color:#EEE6DC;">'+ids.length+'</div></div>'

}
function oFCEdit(id){

}
function cFCMo(evt){

  document.getElementById('fcmod').style.display='none';
}
function closeFCModal(){document.getElementById('fcmod').style.display='none';}

    +'<select class="fc-inp" id="fc-cat" onchange="fcLiveUpdate()">'+catOpts+'</select>'
    +'<span class="fc-label">Prezzo menu (IVA inclusa 10%)</span>'
    +'<input class="fc-inp" type="number" min="0" step="0.5" id="fc-price" value="'+draft.menuPrice+'" placeholder="es. 14.00" oninput="fcLiveUpdate()"/>'
    +'<div class="hl" style="margin-top:14px;"></div>'
    +'<div style="font-size:7px;letter-spacing:3px;text-transform:uppercase;color:#6A5040;margin-bottom:8px;">Ingredienti per porzione</div>'
    +'<div id="fc-ing-list">'+ingRows+'</div>'

    +'<div class="hl" style="margin-top:14px;"></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">'
    +'<div class="fc-meter"><div class="fc-meter-lbl">Costo piatto</div><div class="fc-meter-val" id="fc-r-cost" style="color:#C98A4A;">&#8364;'+cost.toFixed(2)+'</div></div>'
    +'<div class="fc-meter"><div class="fc-meter-lbl">Food cost %</div><div class="fc-meter-val" id="fc-r-pct" style="color:'+col+';">'+fcPct+'%</div></div>'
    +'<div class="fc-meter"><div class="fc-meter-lbl">Margine</div><div class="fc-meter-val" id="fc-r-margin" style="color:'+(margin>=0?'#7A9A5A':'#9A3520')+';">&#8364;'+margin.toFixed(2)+'</div></div>'
    +'</div>'

function fcUnitLabel(u){
  if(u==='g'||u==='ml'||u==='cl') return 'kg';
  if(u==='kg'||u==='l') return u;
  return 'pz';
}

function fcGetDraft(){
  var d=window._fcDraft||{ingredients:[]};
  d.name=document.getElementById('fc-name').value.trim();
  d.cat=document.getElementById('fc-cat').value;
  d.menuPrice=document.getElementById('fc-price').value;
  return d;
}

function fcLiveUpdate(){
  var d=fcGetDraft();
  var cost=fcDishCost(d);
  var menuNet=(parseFloat(d.menuPrice)||0)/(1+FC_IVA);
  var fcPct=menuNet>0?Math.round(cost/menuNet*100):0;
  var margin=menuNet-cost;
  var col=fcColor(fcPct);
  var ce=document.getElementById('fc-r-cost');
  var pe=document.getElementById('fc-r-pct');
  var me=document.getElementById('fc-r-margin');
  if(ce) ce.textContent='\u20ac'+cost.toFixed(2);
  if(pe){pe.textContent=fcPct+'%';pe.style.color=col;}
  if(me){me.textContent='\u20ac'+margin.toFixed(2);me.style.color=margin>=0?'#7A9A5A':'#9A3520';}
}

function fcUpdIng(idx,field,val){
  if(!window._fcDraft) return;
  window._fcDraft.ingredients[idx][field]=val;
  var rows=document.querySelectorAll('#fc-ing-list .fc-ing-row');
  if(rows[idx]){
    var ing=window._fcDraft.ingredients[idx];
    var costEl=rows[idx].querySelector('.fc-ing-cost');
    if(costEl) costEl.textContent='\u20ac'+fcIngCost(ing).toFixed(3);
  }
  fcLiveUpdate();
}

function fcAddIng(){
  if(!window._fcDraft) return;
  window._fcDraft.ingredients.push({name:'',qty:'',unit:'g',unitPrice:''});
  renderFCModal(window._fcDraft);
}

function fcDelIng(idx){
  if(!window._fcDraft) return;
  window._fcDraft.ingredients.splice(idx,1);
  renderFCModal(window._fcDraft);
}

function fcSave(){
  var d=fcGetDraft();
  if(!d.name){showToast('Inserisci il nome del piatto');return;}
  var id=fcEditId||genId();
  dishes[id]=d;
  save();
  closeFCModal();
  rFC();
  showToast(d.name+' salvato');
}

function fcDelete(){
  if(!fcEditId) return;
  var name=dishes[fcEditId].name;
  delete dishes[fcEditId];
  save();
  closeFCModal();
  rFC();
  showToast(name+' eliminato');
}

        +'<div class="tav" style="color:'+SEC_COLOR[sec]+'">'+e[0]+'</div>'
        +'<div style="flex:1;min-width:100px;"><div class="tnm">'+e+'</div><div class="tsb">'+ore+'h quest\'anno</div></div>'
        +'<div style="display:flex;gap:4px;flex-wrap:wrap;">'+secBtns+'</div>'
        +'<button class="trm" onclick="askRm(\''+eq+'\')">rm</button></div>';
    });
    h+='</div>';
  });
  h+='<div class="tl"><div class="tadd">'
    +'<input type="text" id="nemp" placeholder="COGNOME NOME..." onkeydown="if(event.key===\'Enter\')addE()"/>'
    +'<button class="tabtn" onclick="addE()">+ ADD</button></div></div>';
  document.getElementById('vTeam').innerHTML=h;
}
function addE(){var inp=document.getElementById('nemp');var n=inp.value.trim().toUpperCase();if(!n||emp.indexOf(n)>=0)return;emp.push(n);inp.value='';save();rTeam();showToast(n+' aggiunto');}
function askRm(e){rmE=e;document.getElementById('cfnm').textContent=e;document.getElementById('cfmod').style.display='flex';}
function cCf(){document.getElementById('cfmod').style.display='none';rmE=null;}
function doRm(){if(!rmE)return;emp=emp.filter(function(x){return x!==rmE;});Object.keys(data).forEach(function(k){if(k.indexOf('-'+rmE+'-')>=0)delete data[k];});save();cCf();rTeam();showToast('Rimosso');}

// ── CELL MODAL ─────────────────────────────────────────────────────────────────
function oMod(e,d){
  eEmp=e;eDay=d;
  document.getElementById('memp').textContent=e;
  document.getElementById('mdat').textContent=DAYS[new Date(yr,mo,d).getDay()]+', '+d+' '+MONTHS[mo]+' '+yr;
  var cur=gv(e,d);
  var hb='';
  [1,2,3,4,5,6,7,8].forEach(function(n){hb+='<button class="hb'+(cur==n?' hba':'')+'" onclick="setC(\''+n+'\')">'+n+'</button>';});
  document.getElementById('hbs').innerHTML=hb;
  var tg='';
  CODES.filter(function(c){return c.c!=='1';}).forEach(function(c){
    var active=cur===c.c;
    tg+='<button class="tb" style="'+(active?'background:'+c.bg+';color:'+c.fg+';border-color:'+c.bg:'')+'" onclick="setC(\''+c.c+'\')">'+c.c+' &middot; '+c.l+'</button>';
  });
  document.getElementById('tgr').innerHTML=tg;
  document.getElementById('cmod').style.display='flex';
}
function cMo(){document.getElementById('cmod').style.display='none';eEmp=null;eDay=null;}
function setC(v){if(!eEmp)return;data[dkey(eEmp,eDay)]=v.toUpperCase();save();cMo();rCal();}
function clC(){if(!eEmp)return;delete data[dkey(eEmp,eDay)];save();cMo();rCal();}

// ── EXPORT ─────────────────────────────────────────────────────────────────────
function loadXLSX(cb){
  if(xlsxLoaded){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=function(){xlsxLoaded=true;cb();};
  s.onerror=function(){alert('Errore caricamento libreria Excel.');};
  document.head.appendChild(s);
}
function expM(){loadXLSX(doExpM);}
function doExpM(){
  var days=dim(yr,mo);
  var hdr=['Dipendente'];
  for(var d=1;d<=days;d++) hdr.push(d+' '+dname(yr,mo,d));
  hdr=hdr.concat(['Ore','R','F(h)','B','M(h)','P(h)','C']);
  var rows=emp.map(function(e){
    var s=calcS(e,yr,mo);var row=[e];
    for(var d=1;d<=days;d++) row.push(data[yr+'-'+mo+'-'+e+'-'+d]||'');
    return row.concat([s.ore,s.r,s.f,s.b,s.mal,s.p,s.c]);
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([hdr].concat(rows));
  var cols=[{wch:22}];for(var i=0;i<days;i++)cols.push({wch:4});for(var i=0;i<7;i++)cols.push({wch:8});
  ws['!cols']=cols;
  XLSX.utils.book_append_sheet(wb,ws,MONTHS[mo]+' '+yr);
  XLSX.writeFile(wb,'Balagan_'+MONTHS[mo]+'_'+yr+'.xlsx');
  showToast('Esportato: '+MONTHS[mo]+' '+yr);
}
function expAnn(){loadXLSX(doExpAnn);}
function doExpAnn(){
  var wb=XLSX.utils.book_new();
  for(var m=0;m<12;m++){
    var d2=dim(aYr,m);
    var hdr=['Dipendente'];for(var d=1;d<=d2;d++)hdr.push(String(d));
    hdr=hdr.concat(['Ore','F(h)','B','M(h)']);
    var rows=emp.map(function(e){
      var s=calcS(e,aYr,m);var row=[e];
      for(var d=1;d<=d2;d++)row.push(data[aYr+'-'+m+'-'+e+'-'+d]||'');
      return row.concat([s.ore,s.f,s.b,s.mal]);
    });
    var ws=XLSX.utils.aoa_to_sheet([hdr].concat(rows));
    var cols=[{wch:20}];for(var d=0;d<d2;d++)cols.push({wch:3});for(var d=0;d<4;d++)cols.push({wch:8});
    ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,MS[m]);
  }
  XLSX.writeFile(wb,'Balagan_Annuale_'+aYr+'.xlsx');
  showToast('Export '+aYr+' completato');
}

// ── INIT ───────────────────────────────────────────────────────────────────────
function init(){
  document.getElementById('simg').src=DRAG;
  document.getElementById('lg').src=DRAG;
  document.getElementById('lg').style.cssText='width:19px;height:23px;filter:sepia(1) saturate(.5) brightness(.75) opacity(.8)';

  var sE=null,sD=null,sT=null,sSec=null,sFC=null,_ls;
  try{_ls=localStorage.getItem(EK);if(_ls)sE=JSON.parse(_ls);}catch(e){}
  try{_ls=localStorage.getItem(DK);if(_ls)sD=JSON.parse(_ls);}catch(e){}
  try{_ls=localStorage.getItem(TK);if(_ls)sT=JSON.parse(_ls);}catch(e){}
  try{_ls=localStorage.getItem(SK);if(_ls)sSec=JSON.parse(_ls);}catch(e){}
  try{_ls=localStorage.getItem(FCK);if(_ls)sFC=JSON.parse(_ls);}catch(e){}

  emp      = sE   || EMPS;
  turni    = sT   || {};
  sections = sSec || {};
  dishes   = sFC  || {};

  if(sD){
    data=sD;
  } else {
    var expanded={};
    Object.keys(CDATA).forEach(function(k){
      var parts=k.split('-');
      var ey=parts[0],em=parts[1],idx=parseInt(parts[2]),ed=parts[3];
      var en=EMPS[idx];
      if(en) expanded[ey+'-'+em+'-'+en+'-'+ed]=CDATA[k];
    });
    data=expanded;
  }

  renderLegend();
  sv('Cal');
  document.getElementById('app').style.visibility='visible';
  var sp=document.getElementById('splash');
  sp.classList.add('done');
  setTimeout(function(){sp.style.display='none';},350);
}

requestAnimationFrame(function(){setTimeout(init,0);});
</script>
